# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: krknctl build
on:
  release:
    types: [published]
jobs:
  build-linux-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
        cache: false

    - name: install dependencies
      run: |
        sudo apt-get update && sudo apt-get install libbtrfs-dev

    - name: advance version
      run: |
        cat <<< $(jq '.version="${{github.event.release.tag_name}}"' pkg/config/config.json) > pkg/config/config.json

    - name: build linux amd64
      env:
        GOOS: "linux"
        GOARCH: "amd64"
        CGO_ENABLED: 1
        BINARY: "linux-amd64"
      run: |
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz -C $BINARY krknctl

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-amd64
        path: krknctl-${{github.event.release.tag_name}}-linux-amd64.tar.gz

  build-linux-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
        cache: false

    - name: install dependencies
      run: |
        sudo apt-get update && sudo apt-get install libbtrfs-dev gcc-aarch64-linux-gnu

    - name: advance version
      run: |
        cat <<< $(jq '.version="${{github.event.release.tag_name}}"' pkg/config/config.json) > pkg/config/config.json

    - name: build linux arm64
      env:
        GOOS: "linux"
        GOARCH: "arm64"
        CGO_ENABLED: 1
        CC: aarch64-linux-gnu-gcc
        BINARY: "linux-arm64"
      run: |
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz -C $BINARY krknctl

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64
        path: krknctl-${{github.event.release.tag_name}}-linux-arm64.tar.gz

  build-darwin:
    name: Build darwin (both architectures)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: advance version
      run: |
        cat <<< $(jq '.version="${{github.event.release.tag_name}}"' pkg/config/config.json) > pkg/config/config.json

    - name: Build darwin binaries with xgo
      uses: crazy-max/ghaction-xgo@v3
      with:
        xgo_version: latest
        go_version: '1.26.2'
        dest: build
        prefix: krknctl
        targets: darwin/arm64,darwin/amd64
        v: true
        x: false
        race: false
        ldflags: -w -s
        buildmode: default
        buildvcs: auto
        trimpath: true
        pkg: .
        tags: containers_image_openpgp
        buildx: -mod=vendor

    - name: Package darwin arm64
      run: |
        mkdir -p darwin-apple-silicon
        mv build/krknctl-darwin-arm64 darwin-apple-silicon/krknctl
        tar cfvz krknctl-${{github.event.release.tag_name}}-darwin-apple-silicon.tar.gz -C darwin-apple-silicon krknctl

    - name: Package darwin amd64
      run: |
        mkdir -p darwin-intel
        mv build/krknctl-darwin-amd64 darwin-intel/krknctl
        tar cfvz krknctl-${{github.event.release.tag_name}}-darwin-intel.tar.gz -C darwin-intel krknctl

    - name: upload darwin arm64
      uses: actions/upload-artifact@v4
      with:
        name: darwin-apple-silicon
        path: krknctl-${{github.event.release.tag_name}}-darwin-apple-silicon.tar.gz

    - name: upload darwin amd64
      uses: actions/upload-artifact@v4
      with:
        name: darwin-intel
        path: krknctl-${{github.event.release.tag_name}}-darwin-intel.tar.gz

  # Builds a separate linux/amd64 binary inside a CentOS Stream 9 container so
  # the CGO dynamic link is stamped against GLIBC 2.34 (the RHEL 9 / CentOS 9
  # system version) rather than the GLIBC 2.38+ that ubuntu-latest (24.04)
  # would embed.  Consumers on CentOS/RHEL 9 Jenkins agents must use this
  # artifact instead of the standard linux-amd64 build.
  build-linux-amd64-centos9:
    name: Build linux/amd64 (CentOS Stream 9)
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    permissions:
      contents: write
    steps:
    - name: install build dependencies
      run: |
        dnf install -y 'dnf-command(config-manager)'
        dnf config-manager --set-enabled crb
        dnf install -y git curl tar btrfs-progs-devel gcc jq

    - uses: actions/checkout@v4

    - name: install go
      run: |
        curl -fsSL https://go.dev/dl/go1.26.2.linux-amd64.tar.gz | tar -C /usr/local -xz
        echo "/usr/local/go/bin" >> "$GITHUB_PATH"

    - name: advance version
      run: |
        cat <<< $(jq '.version="${{github.event.release.tag_name}}"' pkg/config/config.json) > pkg/config/config.json

    - name: build linux amd64 centos9
      env:
        GOOS: linux
        GOARCH: amd64
        CGO_ENABLED: 1
        BINARY: linux-amd64-centos9
      run: |
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz -C $BINARY krknctl

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-amd64-centos9
        path: krknctl-${{github.event.release.tag_name}}-linux-amd64-centos9.tar.gz

  upload-releases:
    name: Upload release artifacts
    needs: [build-linux-amd64, build-linux-arm64, build-darwin, build-linux-amd64-centos9]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cd artifacts
        for dir in */; do
          for file in "$dir"*.tar.gz; do
            gh release upload ${{github.event.release.tag_name}} "$file" --repo ${{github.repository}}
          done
        done

    - name: Generate and upload checksums
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cd artifacts
        sha256sum */*.tar.gz > checksums.txt
        gh release upload ${{github.event.release.tag_name}} checksums.txt --clobber --repo ${{github.repository}}
