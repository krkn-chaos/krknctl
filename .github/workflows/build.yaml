# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: krknctl build
on:
  release:
    types: [published]
jobs:
  build:
    name: krknctl build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
        cache: false

    - name: install dependencies
      run: |
        sudo apt-get update && sudo apt-get install libbtrfs-dev gcc-aarch64-linux-gnu

    - name: advance version
      run: |
        cat <<< $(jq '.version="${{github.event.release.tag_name}}"' pkg/config/config.json) > pkg/config/config.json 

    - name: build linux amd64
      env:
        GOOS: "linux"
        GOARCH: "amd64"
        CGO_ENABLED: 1
        BINARY: "linux-amd64"
        GH_TOKEN: ${{ github.token }}
      run: |
        export FILENAME=krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz $FILENAME -C $BINARY krknctl
        gh release upload ${{github.event.release.tag_name}} $FILENAME

    - name: build linux arm64
      env:
        GOOS: "linux"
        GOARCH: "arm64"
        CGO_ENABLED: 1
        CC: aarch64-linux-gnu-gcc
        BINARY: "linux-arm64"
        GH_TOKEN: ${{ github.token }}
      run: |
        export FILENAME=krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz $FILENAME -C $BINARY krknctl
        gh release upload ${{github.event.release.tag_name}} $FILENAME

    - name: setup osxcross for darwin cross-compilation
      run: |
        git clone https://github.com/plentico/osxcross-target.git /tmp/osxcross
        echo "OSXCROSS_ROOT=/tmp/osxcross/target" >> $GITHUB_ENV
        echo "/tmp/osxcross/target/bin" >> $GITHUB_PATH

    - name: build darwin arm64
      env:
        GOOS: "darwin"
        GOARCH: "arm64"
        CGO_ENABLED: 1
        CC: oa64-clang
        CXX: oa64-clang++
        BINARY: "darwin-apple-silicon"
        GH_TOKEN: ${{ github.token }}
      run: |
        export FILENAME=krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz $FILENAME -C $BINARY krknctl
        gh release upload ${{github.event.release.tag_name}} $FILENAME

    - name: build darwin amd64
      env:
        GOOS: "darwin"
        GOARCH: "amd64"
        CGO_ENABLED: 1
        CC: o64-clang
        CXX: o64-clang++
        BINARY: "darwin-intel"
        GH_TOKEN: ${{ github.token }}
      run: |
        export FILENAME=krknctl-${{github.event.release.tag_name}}-$BINARY.tar.gz
        go build -mod=vendor -tags containers_image_openpgp -ldflags="-w -s" -o $BINARY/ ./...
        tar cfvz $FILENAME -C $BINARY krknctl
        gh release upload ${{github.event.release.tag_name}} $FILENAME

    - name: generate and upload checksums
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        sha256sum krknctl-${{github.event.release.tag_name}}-*.tar.gz > checksums.txt
        gh release upload ${{github.event.release.tag_name}} checksums.txt --clobber

